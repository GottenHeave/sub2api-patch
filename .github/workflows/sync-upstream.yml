name: Sync upstream

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UPSTREAM_REPOSITORY: Wei-Shaw/sub2api
  UPSTREAM_BRANCH: main
  MIRROR_BRANCH: mirror/upstream-main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patchset
        uses: actions/checkout@v7.0.0
        with:
          ref: patchset
          fetch-depth: 0

      - name: Fetch upstream read-only
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "${UPSTREAM_BRANCH}" --tags --prune
          echo "UPSTREAM_HEAD_SHA=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_ENV"

      - name: Select latest upstream commit with passing CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          upstream_sha="$(scripts/upstream-ci-ready.sh "$UPSTREAM_REPOSITORY" "$UPSTREAM_HEAD_SHA")"
          echo "UPSTREAM_SHA=$upstream_sha" >> "$GITHUB_ENV"

      - name: Update mirror branch
        run: |
          set -euo pipefail
          git checkout -B "$MIRROR_BRANCH" "$UPSTREAM_SHA"
          git config user.name "sub2api-patch automation"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git ls-files .github/workflows)" ]; then
            rm -rf .github/workflows
            git add -A .github/workflows
            git commit -m "Remove upstream workflows from mirror branch"
          fi
          git push origin "$MIRROR_BRANCH" --force

      - name: Open internal sync request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main
          if git diff --quiet "$UPSTREAM_SHA" origin/main -- . ':(exclude).github/workflows'; then
            echo "main already matches upstream commit ${UPSTREAM_SHA} outside workflow files; no sync request needed."
            exit 0
          fi

          existing="$(gh pr list --head "$MIRROR_BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          body="Internal sync request for upstream commit ${UPSTREAM_SHA}. Upstream was read only. Upstream CI was passing before this branch was updated."
          if [ -z "$existing" ]; then
            if ! gh pr create --base main --head "$MIRROR_BRANCH" --title "sync upstream main" --body "$body"; then
              echo "Unable to create internal sync request after updating ${MIRROR_BRANCH}; branch sync completed."
              exit 0
            fi
          else
            gh pr edit "$existing" --body "$body"
          fi

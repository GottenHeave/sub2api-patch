name: Sync upstream

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UPSTREAM_REPOSITORY: Wei-Shaw/sub2api
  UPSTREAM_BRANCH: main
  MIRROR_BRANCH: mirror/upstream-main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patchset
        uses: actions/checkout@v7.0.0
        with:
          ref: patchset
          fetch-depth: 0

      - name: Fetch upstream read-only
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "${UPSTREAM_BRANCH}" --tags --prune
          echo "UPSTREAM_HEAD_SHA=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_ENV"

      - name: Select latest upstream commit with passing CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          upstream_sha="$(scripts/upstream-ci-ready.sh "$UPSTREAM_REPOSITORY" "$UPSTREAM_HEAD_SHA")"
          echo "UPSTREAM_SHA=$upstream_sha" >> "$GITHUB_ENV"

      - name: Update mirror branch
        run: |
          set -euo pipefail
          validation_workflow="$(mktemp)"
          cp .github/workflows/upstream-pr-check.yml "$validation_workflow"
          git checkout -B "$MIRROR_BRANCH" "$UPSTREAM_SHA"
          git config user.name "sub2api-patch automation"
          git config user.email "actions@users.noreply.github.com"
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp "$validation_workflow" .github/workflows/upstream-pr-check.yml
          git add -A .github/workflows
          if ! git diff --cached --quiet; then
            git commit -m "Install downstream validation workflow on mirror branch"
          fi
          git push origin "$MIRROR_BRANCH" --force

      - name: Open internal sync request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main
          if git diff --quiet "$MIRROR_BRANCH" origin/main -- .; then
            echo "main already matches mirror candidate ${MIRROR_BRANCH}; no sync request needed."
            exit 0
          fi

          existing="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" \
            -f state="open" \
            -f head="${GITHUB_REPOSITORY_OWNER}:${MIRROR_BRANCH}" \
            -f base="main" \
            --jq '.[0].number // empty')"
          body="Internal sync request for upstream commit ${UPSTREAM_SHA}. Upstream was read only. Upstream CI was passing before this branch was updated."
          if [ -z "$existing" ]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pulls" \
              -f title="sync upstream main" \
              -f head="$MIRROR_BRANCH" \
              -f base="main" \
              -f body="$body" \
              --jq .html_url
          else
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/pulls/${existing}" \
              -f body="$body" \
              --jq .html_url
          fi

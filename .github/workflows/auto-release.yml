name: Auto release

on:
  workflow_run:
    workflows:
      - Patch validation
    types:
      - completed
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream ref to release
        required: false
        default: main

permissions:
  contents: write
  packages: write
  actions: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UPSTREAM_REPOSITORY: Wei-Shaw/sub2api
  PATCHED_BRANCH: patched

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'mirror/upstream-main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patchset
        uses: actions/checkout@v6.0.3
        with:
          ref: patchset
          path: sub2api-patch
          fetch-depth: 0

      - name: Resolve manual upstream candidate
        id: resolve_manual
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          target_ref="${{ inputs.upstream_ref }}"
          target_ref="${target_ref:-main}"

          mkdir -p worktree
          git -C worktree init
          git -C worktree remote add origin "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git -C worktree fetch --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

          candidate=""
          if git -C worktree rev-parse -q --verify "${target_ref}^{commit}" >/dev/null; then
            candidate="${target_ref}"
          elif git -C worktree rev-parse -q --verify "refs/tags/${target_ref}^{commit}" >/dev/null; then
            candidate="refs/tags/${target_ref}"
          elif git -C worktree rev-parse -q --verify "refs/remotes/origin/${target_ref#refs/heads/}^{commit}" >/dev/null; then
            candidate="refs/remotes/origin/${target_ref#refs/heads/}"
          fi

          if [ -z "${candidate}" ]; then
            {
              echo "### Auto release skipped"
              echo
              echo "Manual upstream ref could not be resolved in ${UPSTREAM_REPOSITORY}."
              echo
              echo "Requested ref: \`${target_ref}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          upstream_sha="$(git -C worktree rev-parse "${candidate}^{commit}")"
          git -C worktree checkout --detach "${upstream_sha}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout validated mirror candidate
        if: (github.event_name == 'workflow_run') && (github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true')
        uses: actions/checkout@v6.0.3
        with:
          ref: mirror/upstream-main
          path: worktree
          fetch-depth: 0

      - name: Verify validated mirror SHA
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          actual="$(git -C worktree rev-parse HEAD)"
          expected="${{ github.event.workflow_run.head_sha }}"
          if [ "$actual" != "$expected" ]; then
            echo "mirror branch moved after validation: expected $expected, got $actual" >&2
            exit 1
          fi

      - name: Require manual upstream CI success
        if: (github.event_name == 'workflow_dispatch') && (github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          upstream_sha="$(git -C worktree rev-parse HEAD)"
          sub2api-patch/scripts/upstream-ci-ready.sh "$UPSTREAM_REPOSITORY" "$upstream_sha"

      - name: Setup Go
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: worktree/backend/go.mod
          cache-dependency-path: worktree/backend/go.sum

      - name: Setup pnpm
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 9

      - name: Setup Node.js
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: worktree/frontend/pnpm-lock.yaml

      - name: Record upstream base
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        run: |
          set -euo pipefail
          echo "UPSTREAM_COMMIT=$(git -C worktree rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "UPSTREAM_COMMIT_SHORT=$(git -C worktree rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"

      - name: Apply patches
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        run: sub2api-patch/scripts/apply-patches.sh worktree

      - name: Run release gates
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sub2api-patch/scripts/check-no-pr-issue-refs.sh sub2api-patch
          (cd worktree/backend && go test ./...)
          pnpm --dir worktree/frontend install --frozen-lockfile
          pnpm --dir worktree/frontend run typecheck
          pnpm --dir worktree/frontend run lint:check

      - name: Compute version
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(sub2api-patch/scripts/compute-next-version.sh worktree)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Prepare release notes
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        run: |
          set -euo pipefail
          upstream_version="$(tr -d '[:space:]' < worktree/backend/cmd/server/VERSION)"
          patchset_commit="$(git -C sub2api-patch rev-parse --short=12 HEAD)"
          echo "RELEASE_REVISION=$(git -C worktree rev-parse HEAD)" >> "$GITHUB_ENV"
          cat > release-notes.md <<EOF
          ${VERSION}

          Base:
          - upstream tag: v${upstream_version}
          - upstream commit: ${UPSTREAM_COMMIT_SHORT}
          - patchset commit: ${patchset_commit}

          Patch topics:
          - CI image publishing
          - IPv6-only proxy probing
          - OpenAI realtime websocket proxying
          - OpenAI audio transcription proxying
          - Audio usage accounting and billing
          - OpenAI realtime REST endpoints
          EOF
          sub2api-patch/scripts/check-no-pr-issue-refs.sh sub2api-patch
          if grep -E '#[0-9]+|/issues/[0-9]+|/pull/[0-9]+' release-notes.md; then
            echo "blocked reference found in release notes" >&2
            exit 1
          fi

      - name: Set lowercase image owner
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        id: image
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4.1.0

      - name: Preflight release image build
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: docker/build-push-action@v7.2.0
        with:
          context: worktree
          file: worktree/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=sub2api-patch-release
          cache-to: type=gha,mode=max,scope=sub2api-patch-release
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ env.RELEASE_REVISION }}

      - name: Publish patched branch and reserve tag
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        run: |
          set -euo pipefail
          cd worktree
          git config user.name "sub2api-patch automation"
          git config user.email "actions@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "release tag already exists: ${VERSION}" >&2
            exit 1
          fi
          git checkout -B "$PATCHED_BRANCH"
          rm -rf .github/workflows
          git add -A .github/workflows
          if ! git diff --cached --quiet; then
            git commit -m "Remove upstream workflows from patched branch"
          fi
          git tag "$VERSION"
          git push origin "$PATCHED_BRANCH" --force
          git push origin "$VERSION"

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and publish release image
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        uses: docker/build-push-action@v7.2.0
        with:
          context: worktree
          file: worktree/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/sub2api-patch:${{ env.VERSION }}
            ghcr.io/${{ steps.image.outputs.owner }}/sub2api-patch:latest-patch
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ env.RELEASE_REVISION }}
          cache-from: type=gha,scope=sub2api-patch-release
          cache-to: type=gha,mode=max,scope=sub2api-patch-release

      - name: Create release
        if: github.event_name != 'workflow_dispatch' || steps.resolve_manual.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" --repo "${{ github.repository }}" --title "$VERSION" --notes-file release-notes.md

